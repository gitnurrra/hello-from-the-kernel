name: Build
permissions:
  contents: read
on:
  push:
    branches:
      - master
jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Build and Run
        run: |
          gcc -o main_linux_x64 main_linux_x64.c
          ./main_linux_x64

  build-mac-x64:
    runs-on: macos-13
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Build and Run
        run: |
          gcc -o main_mac_x64 main_mac_x64.c
          ./main_mac_x64
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Build and Run
        run: |
          gcc -o main_mac_arm64 main_mac_arm64.c
          ./main_mac_arm64
  build-winx-64:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Build and Run
        run: |
          gcc -o main_win_x64 main_win_x64.c
          ./main_win_x64
